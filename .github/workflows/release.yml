name: Release

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.pkg.outputs.version }}
      image: ghcr.io/dfsf5263/health-tracker

    steps:
      - uses: actions/checkout@v4

      - name: Read package version
        id: pkg
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check version tag immutability
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          if docker manifest inspect "ghcr.io/dfsf5263/health-tracker:${VERSION}" > /dev/null 2>&1; then
            echo "::error::Image tag ${VERSION} already exists in GHCR. Bump the version in package.json before merging."
            exit 1
          fi
          echo "✓ Tag ${VERSION} is available"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dfsf5263/health-tracker
          tags: |
            type=raw,value=latest,enable={{is_default_branch}},priority=1000
            type=raw,value=${{ steps.pkg.outputs.version }}
            type=ref,event=branch
            type=sha,prefix=sha-

  docker-amd64:
    name: Build amd64 Image
    runs-on: ubuntu-latest
    needs: prepare

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ needs.prepare.outputs.image }}:build-amd64-${{ github.sha }}
          cache-from: type=gha,scope=release-amd64
          cache-to: type=gha,mode=max,scope=release-amd64

  docker-arm64:
    name: Build arm64 Image
    runs-on: ubuntu-24.04-arm
    needs: prepare

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push arm64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ needs.prepare.outputs.image }}:build-arm64-${{ github.sha }}
          cache-from: type=gha,scope=release-arm64
          cache-to: type=gha,mode=max,scope=release-arm64

  docker-manifest:
    name: Publish Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [prepare, docker-amd64, docker-arm64]

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Read package version
        id: pkg
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}},priority=1000
            type=raw,value=${{ steps.pkg.outputs.version }}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Create and push multi-arch manifest
        env:
          AMD64_IMAGE: ${{ needs.prepare.outputs.image }}:build-amd64-${{ github.sha }}
          ARM64_IMAGE: ${{ needs.prepare.outputs.image }}:build-arm64-${{ github.sha }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          TAG_ARGS=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS="$TAG_ARGS -t $tag"
          done <<EOF
          $TAGS
          EOF

          docker buildx imagetools create \
            $TAG_ARGS \
            "$AMD64_IMAGE" \
            "$ARM64_IMAGE"
