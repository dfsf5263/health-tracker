name: Release

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  IMAGE: ghcr.io/dfsf5263/health-tracker

jobs:
  # ── Prepare ────────────────────────────────────────────────
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      is_release: ${{ steps.context.outputs.is_release }}
      version: ${{ steps.pkg.outputs.version }}
      date: ${{ steps.context.outputs.date }}

    steps:
      - uses: actions/checkout@v4

      - name: Read package version
        id: pkg
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Determine build context
        id: context
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Verify git tag matches package version
        if: steps.context.outputs.is_release == 'true'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="${{ steps.pkg.outputs.version }}"
          if [[ "$TAG_VERSION" != "$PKG_VERSION" ]]; then
            echo "::error::Git tag v${TAG_VERSION} does not match package.json version ${PKG_VERSION}. Update package.json before tagging."
            exit 1
          fi
          echo "✓ Git tag v${TAG_VERSION} matches package.json"

      - name: Check version tag immutability
        if: steps.context.outputs.is_release == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          VERSION="${{ steps.pkg.outputs.version }}"
          if docker manifest inspect "${{ env.IMAGE }}:${VERSION}" > /dev/null 2>&1; then
            echo "::error::Image tag ${VERSION} already exists in GHCR. Bump the version in package.json before tagging."
            exit 1
          fi
          echo "✓ Tag ${VERSION} is available"

  # ── Build (amd64) ─────────────────────────────────────────
  docker-amd64:
    name: Build amd64 Image
    runs-on: ubuntu-latest
    needs: prepare

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:build-amd64-${{ github.sha }}
          cache-from: type=gha,scope=release-amd64
          cache-to: type=gha,mode=max,scope=release-amd64

  # ── Build (arm64) ─────────────────────────────────────────
  docker-arm64:
    name: Build arm64 Image
    runs-on: ubuntu-24.04-arm
    needs: prepare

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push arm64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:build-arm64-${{ github.sha }}
          cache-from: type=gha,scope=release-arm64
          cache-to: type=gha,mode=max,scope=release-arm64

  # ── Publish multi-arch manifest ───────────────────────────
  docker-manifest:
    name: Publish Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [prepare, docker-amd64, docker-arm64]

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Nightly tags (main branch push)
      - name: Create nightly manifest
        if: needs.prepare.outputs.is_release == 'false'
        run: |
          docker buildx imagetools create \
            -t "${{ env.IMAGE }}:nightly" \
            -t "${{ env.IMAGE }}:nightly-${{ needs.prepare.outputs.date }}" \
            -t "${{ env.IMAGE }}:nightly-sha-${{ github.sha }}" \
            "${{ env.IMAGE }}:build-amd64-${{ github.sha }}" \
            "${{ env.IMAGE }}:build-arm64-${{ github.sha }}"

      # Release tags (v* tag push)
      - name: Create release manifest
        if: needs.prepare.outputs.is_release == 'true'
        run: |
          docker buildx imagetools create \
            -t "${{ env.IMAGE }}:latest" \
            -t "${{ env.IMAGE }}:${{ needs.prepare.outputs.version }}" \
            -t "${{ env.IMAGE }}:sha-${{ github.sha }}" \
            "${{ env.IMAGE }}:build-amd64-${{ github.sha }}" \
            "${{ env.IMAGE }}:build-arm64-${{ github.sha }}"

      - name: Build release notes file
        if: needs.prepare.outputs.is_release == 'true'
        run: |
          PREV_TAG="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"

          {
            echo "## Synopsis"
            echo

            if [[ -n "$PREV_TAG" ]]; then
              git log --format="- %s" "${PREV_TAG}..${GITHUB_REF_NAME}"
            else
              git log --format="- %s" "${GITHUB_REF_NAME}"
            fi

            echo
            echo "## Docker"
            echo
            echo '```bash'
            echo "docker pull ${{ env.IMAGE }}:${{ needs.prepare.outputs.version }}"
            echo '```'
          } > "$NOTES_FILE"

      - name: Create GitHub Release
        if: needs.prepare.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: ${{ runner.temp }}/release-notes.md
