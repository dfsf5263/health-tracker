name: Release

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  docker:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Read package version
        id: pkg
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check version tag immutability
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          if docker manifest inspect "ghcr.io/dfsf5263/health-tracker:${VERSION}" > /dev/null 2>&1; then
            echo "::error::Image tag ${VERSION} already exists in GHCR. Bump the version in package.json before merging."
            exit 1
          fi
          echo "✓ Tag ${VERSION} is available"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dfsf5263/health-tracker
          tags: |
            type=raw,value=latest,enable={{is_default_branch}},priority=1000
            type=raw,value=${{ steps.pkg.outputs.version }}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
